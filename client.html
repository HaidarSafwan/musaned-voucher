<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Serial Number Enricher</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f4f6f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.1); padding: 40px; width: 460px; }
        h2 { margin-bottom: 24px; font-size: 1.3rem; color: #222; }
        .drop-zone {
            border: 2px dashed #ccc; border-radius: 6px; padding: 36px;
            text-align: center; cursor: pointer; color: #888; transition: border-color .2s;
        }
        .drop-zone.over { border-color: #4a90e2; color: #4a90e2; }
        .drop-zone input { display: none; }
        .file-name { margin-top: 10px; font-size: .9rem; color: #555; min-height: 20px; }
        button {
            margin-top: 20px; width: 100%; padding: 11px;
            background: #4a90e2; color: #fff; border: none;
            border-radius: 6px; font-size: 1rem; cursor: pointer;
        }
        button:disabled { background: #a0b9d9; cursor: default; }
        .progress-wrap { margin-top: 20px; display: none; }
        .progress-bar-bg { background: #e8ecf0; border-radius: 4px; height: 10px; overflow: hidden; }
        .progress-bar { background: #4a90e2; height: 100%; width: 0; transition: width .3s; }
        .status-text { margin-top: 10px; font-size: .85rem; color: #555; text-align: center; }
        .error { margin-top: 16px; color: #c0392b; font-size: .9rem; display: none; }
    </style>
</head>
<body>
<div class="card">
    <h2>Serial Number Enricher</h2>

    <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".csv">
        <span>Drop CSV here or <u>click to browse</u></span>
    </div>
    <div class="file-name" id="fileName"></div>

    <button id="uploadBtn" disabled>Upload &amp; Enrich</button>

    <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
        <div class="status-text" id="statusText">Starting…</div>
    </div>

    <div class="error" id="errorBox"></div>
</div>

<script>
const GO_SERVICE_URL = 'http://localhost:8081';
const API_KEY        = '8ddOUjRjlHHfH9R14vQlao7il8JTWiPp'; // must match api_key in config.json

const dropZone   = document.getElementById('dropZone');
const fileInput  = document.getElementById('fileInput');
const fileName   = document.getElementById('fileName');
const uploadBtn  = document.getElementById('uploadBtn');
const progressWrap = document.getElementById('progressWrap');
const progressBar  = document.getElementById('progressBar');
const statusText   = document.getElementById('statusText');
const errorBox     = document.getElementById('errorBox');

let selectedFile = null;

// --- File selection ---
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => selectFile(fileInput.files[0]));

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('over');
    selectFile(e.dataTransfer.files[0]);
});

function selectFile(file) {
    if (!file || !file.name.endsWith('.csv')) {
        showError('Please select a .csv file.');
        return;
    }
    selectedFile = file;
    fileName.textContent = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
    uploadBtn.disabled = false;
    hideError();
}

// --- Upload flow ---
uploadBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    uploadBtn.disabled = true;
    progressWrap.style.display = 'block';
    hideError();
    setProgress(0, 'Reading file…');

    try {
        const base64 = await toBase64(selectedFile);
        setProgress(5, 'Submitting job…');

        const jobId = await submitJob(base64);
        setProgress(10, 'Processing…');

        await pollUntilDone(jobId);
        setProgress(100, 'Done! Downloading result…');

        downloadResult(jobId);
    } catch (err) {
        showError(err.message);
    } finally {
        uploadBtn.disabled = false;
    }
});

// --- Helpers ---
function toBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = () => resolve(reader.result.split(',')[1]); // strip data URI prefix
        reader.onerror = () => reject(new Error('Failed to read file'));
        reader.readAsDataURL(file);
    });
}

async function submitJob(base64) {
    const res = await fetch(`${GO_SERVICE_URL}/api/jobs`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
        body: JSON.stringify({ file: base64 }),
    });
    if (!res.ok) throw new Error(`Submit failed: ${await res.text()}`);
    const data = await res.json();
    return data.job_id;
}

async function pollUntilDone(jobId) {
    while (true) {
        const res  = await fetch(`${GO_SERVICE_URL}/api/jobs/${jobId}`, {
            headers: { 'X-API-Key': API_KEY },
        });
        const job  = await res.json();
        const pct  = Math.max(10, job.Progress);

        if (job.Status === 'done')   { setProgress(100, 'Complete'); return; }
        if (job.Status === 'failed') throw new Error(job.Error || 'Job failed');

        setProgress(pct, `Processing… ${pct}%`);
        await sleep(2000);
    }
}

async function downloadResult(jobId) {
    const res = await fetch(`${GO_SERVICE_URL}/api/jobs/${jobId}/result`, {
        headers: { 'X-API-Key': API_KEY },
    });
    if (!res.ok) throw new Error(`Download failed: ${await res.text()}`);
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'result.csv';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
}

function setProgress(pct, text) {
    progressBar.style.width = pct + '%';
    statusText.textContent  = text;
}

function showError(msg) {
    errorBox.textContent    = msg;
    errorBox.style.display  = 'block';
    progressWrap.style.display = 'none';
}

function hideError() {
    errorBox.style.display = 'none';
}

function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
}
</script>
</body>
</html>
